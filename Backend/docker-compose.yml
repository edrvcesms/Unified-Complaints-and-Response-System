version: "3.9"

services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      TMPDIR: /shared_tmp
    volumes:
      - upload_tmp:/shared_tmp
    depends_on:
      - redis
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: always

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: celery_worker
    command: celery -A app.celery_worker.celery_worker worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      TMPDIR: /shared_tmp
    volumes:
      - upload_tmp:/shared_tmp
    depends_on:
      - redis
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: always

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: celery_beat
    command: celery -A app.celery_worker.celery_worker beat --loglevel=info
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      TMPDIR: /shared_tmp
    volumes:
      - upload_tmp:/shared_tmp
    depends_on:
      - redis
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: always

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data:
  upload_tmp: